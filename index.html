<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>DharmaPro CRM</title>
<style>
  html, body {
    margin: 0;
    padding: 0;
    width: 100%;
    height: 100%;
    overflow: hidden;
    background: #0a0d12;
  }
  #loading {
    position: fixed;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    gap: 12px;
    color: #8a93a3;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
    font-size: 14px;
    background: #0a0d12;
    z-index: 1;
    transition: opacity .3s ease;
  }
  #loading .spin {
    width: 28px;
    height: 28px;
    border: 3px solid #2a2f3a;
    border-top-color: #8a93a3;
    border-radius: 50%;
    animation: girar 0.8s linear infinite;
  }
  @keyframes girar { to { transform: rotate(360deg); } }
  iframe {
    border: 0;
    width: 100%;
    height: 100%;
    display: block;
  }
</style>
</head>
<body>
  <div id="loading">
    <div class="spin"></div>
    <div>Carregando DharmaPro CRM…</div>
  </div>
  <iframe
    title="DharmaPro CRM"
    src="https://script.google.com/macros/s/AKfycbyOB1HP_wIn0Haxw14npDgY7imWJL7wCEDvrnrVvU8WiXyDwXWa36PAo7Kd06sxEoMTKw/exec"
    allow="clipboard-write"
    onload="document.getElementById('loading').style.display='none'">
  </iframe>
</body>
</html>
